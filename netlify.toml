[build]
  # La commande que Netlify va lancer (ton Makefile est utile ici !)
  command = "make setup  && make build"
  # Le dossier que Netlify doit servir
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"

[[redirects]]
  # Crucial pour React Router : redirige toutes les routes vers index.html
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  # Sécurité + pas de cache sur index.html (sinon le navigateur ne recharge jamais l'app)
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  # Cache agressif uniquement pour les assets Vite (noms hachés → immuables)
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"